<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丸山歯科医院</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header>
    <h1>丸山歯科医院</h1>
    <nav>
      <a href="#about">当院について</a>
      <a href="#services">診療案内</a>
      <a href="#access">アクセス</a>
      <a href="#contact">お問い合わせ</a>
    </nav>
  </header>

  <!-- ヒーローセクション -->
  <section class="hero">
    <h2>地域に根ざしたやさしい歯医者さん</h2>
    <p>安心・安全な治療を心がけています。</p>
  </section>

  <!-- 当院について -->
  <section id="about">
    <h2>当院について</h2>
    <p>丸山歯科医院は、家族みんなが安心して通える歯科医院を目指しています。</p>
  </section>

  <!-- 診療案内 -->
  <section id="services">
    <h2>診療案内</h2>
    <ul>
      <li>一般歯科</li>
      <li>小児歯科</li>
      <li>予防歯科</li>
      <li>ホワイトニング</li>
    </ul>
  </section>

  <!-- アクセス -->
  <section id="access">
    <h2>アクセス</h2>
    <p>〒655-0004　神戸市垂水区学が丘4丁目25-1</p>
    <p>最寄駅：学園都市駅</p>
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3282.415787353876!2d135.05289877557107!3d34.67888798474121!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60008fc06a55c3df%3A0xfdd86e617ff74e69!2z44CSNjU1LTAwMDQg56We5aWI5bed55yM6YeR5rKi5biC6Z2O5Zyw5Y2X44GuNC3lt7cgTWFydXlhbWEgRGVudGFsIENsaW5pYw!5e0!3m2!1sja!2sjp!4v1697000000000!5m2!1sja!2sjp" 
      width="100%" 
      height="300" 
      style="border:0;" 
      allowfullscreen="" 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </section>

  <!-- お問い合わせ -->
  <section id="contact">
    <h2>お問い合わせ</h2>
    <form>
      <label>お名前：<br><input type="text" name="name" required></label><br><br>
      <label>メールアドレス：<br><input type="email" name="email" required></label><br><br>
      <label>ご用件：<br><textarea name="message" rows="5" required></textarea></label><br><br>
      <button type="submit">送信</button>
    </form>
  </section>

  <!-- フッター -->
  <footer>
    <p>&copy; 2025 丸山歯科医院</p>
  </footer>
</body>
</html>
